
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Denotes Required Information</title>
  <link rel="stylesheet" href="../css/style.css">

</head>

<body>
  <h2>Donor Information</h2>

  <form action ="#" method="post">
    <table align="center">
      <tr>
        <td><label for="firstname">First Name:</label></td>
        <td><input type="text" id="firstname" name="firstname" align="center" size="50" required></td>
      </tr>
      <tr>
        <td><label for="lastname">Last Name:</label></td>
        <td><input type="text" id="lastname" name="lastname" align="center" size="50" required></td>
      </tr>
      <tr>
        <td><label for="company">Company:</label></td>
        <td><input type="text" id="company" name="company" align="center" size="50"></td>
      </tr>
      <tr>
        <td><label for="address1">Address 1:</label></td>
        <td><input type="text" id="address1" name="address1" align="center" size="50" required></td>
      </tr>
      <tr>
        <td><label for="address2">Address 2:</label></td>
        <td><input type="text" id="address2" name="address2" align="center" size="50"></td>
      </tr>
      
      <tr>
        <td><label for="city">City:</label></td>
        <td><input type="text" id="city" name="city" align="center" size="50" required></td>
      </tr>
      <tr>
        <td><label for="state">State:</label></td>
        <td><select id="state" name="state" align="center" required>
          <option value="">Select a state</option>
          <option value="AL">Dhaka</option>
          <option value="AK">Sylhet</option>
          <option value="AZ">Chittagong</option>
          <!-- Add more states as needed -->
        </select></td>
      </tr>
      <tr>
        <td><label for="zip">Zip Code:</label></td>
        <td><input type="text" id="zip" name="zip" align="center" size="10" required></td>
      </tr>
      <tr>
        <td><label for="country">Country:</label></td>
        <td><select id="country" name="country" align="center" required>
          <option>Select a country</option>
          <option>Bangladesh</option>
          <option>Canada</option>
          <!-- Add more countries as needed -->
        </select></td>
      </tr>
      <tr>
        <td><label for="phone">Phone:</label></td>
        <td><input type="tel" id="phone" name="phone" align="center" size="50" required></td>
      </tr>
      <tr>
        <td><label for="fax">Fax:</label></td>
        <td><input type="tel" id="fax" name="fax" align="center" size="50"></td>
      </tr>
      <tr>
        <td><label for="email">Email:</label></td>
        <td><input type="email" id="email" name="email" align="center" size="50" required></td>
      </tr>
      </table>
      <table align="center">
        <tr>
          <td><label for="donation"><b>Donation Amount:</b></label></td>
       
          <td><input type="radio" id="donation1" name="donation" value="0" align="center">
            <label for="donation1">None</label>
            <input type="radio" id="donation2" name="donation" value="50">
            <label for="donation2">$50</label>
            <input type="radio" id="donation3" name="donation" value="75">
          <label for="donation3">$75</label>
          <input type="radio" id="donation4" name="donation" value="100" align="center">
          <label for="donation4">$100</label>
          <input type="radio" id="donation5" name="donation" value="250" align="center">
          <label for="donation5">$250</label>
            <input type="radio" id="donation6" name="donation" value="other" align="center">
            <label for="donation6">Other</label>
            <br>
            <label for="otherDonation"><b>Other Amount:</b></label>
            <input type="text" id="otherDonation" name="otherDonation" placeholder="Enter amount">
        </td>
        <br>
      </tr>
      </table>
      <table align="center">
        <tr>
            <td><label for="recurringdonation">Recurring Donation:</label></td>
            <br>
            <td><input type="checkbox" id="recurringdonation" name="recurringdonation" value="yes" align="center">I am interested in giving on a regular basis.</td>
        </tr>
      </table>
      <table align="center">
        <tr>
            <td><label for="recurringamountandmonths">Monthly Credit Card $</label><input type="number" id="recurringamountandmonths" name="recurringamountandmonths" size="20" min="0" step="0.01" align="center"> For <input type="number" id="recurringmonths" name="recurringmonths" size="20" min="1" value="12" align="center"> Months</td>
      </table>

      <h2>Honorarium and Memorial Donation Information</h2>
      <table align="center">
        <tr>
            <td><label for="donationto"><b>I would like to make this donation</b></label></td>
            <td><input type="radio" id="donationto" name="donationto" align="center">To Honor</td>
        </tr>
        <tr>
            <td></td>
            <td><input type="radio" id="donationto2" name="donationto" align="center">In Memory of</td>
        </tr>
        <tr>
            <td><label for="honorname"><b>Name:</b></label></td>
            <td><input type="text" id="honorname" name="honoree" align="center" size="50"></td>
        </tr>
        <tr>
            <td><label for="acknowledgedonationto"><b>Acknowledge Donation to:</b></label></td>
            <td><input type="text" id="acknowledgedonationto" name="acknowledgedonationto" align="center" size="50"></td>
        </tr>
        <tr>
            <td><label for="address"><b>Address:</b></label></td>
            <td><input type="text" id="address" name="address" align="center" size="50"></td>
        </tr>
        <tr>
            <td><label for="city"><b>City:</b></label></td>
            <td><input type="text" id="city" name="city" align="center" size="50"></td>
        </tr>
        <tr>
            <td><label for="state"><b>State:</b></label></td>
            <td><select id="state" name="state" align="center">
          <option value="">Select a state</option>
          <option value="AL">Dhaka</option>
          <option value="AK">Sylhet</option>
          <option value="AZ">Chittagong</option>
          <!-- Add more states as needed -->
        </select></td>
        </tr>
        <tr>
            <td><label for="zip"><b>Zip:</b></label></td>
            <td><input type="text" id="zip" name="zip" align="center" size="10"></td>
        </tr>
      </table>

  </form>
</body>
</html>
