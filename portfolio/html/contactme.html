<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Me</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

<body>
    <h1>Contact Me</h1>
    <form action="post">
        <fieldset>
        <label for ="name">First Name :</label>    
       <input type="text" name="name" placeholder=" Enter First Name"><br><br>
       <label for ="lastname">Last Name :</label>
       <input type="text" name="lastname" placeholder="Enter Last Name"><br><br>
       <label for ="gender">Your Gender :</label>
       <input type="radio" name="gender" value="male">Male
       <input type="radio" name="gender" value="female">Female<br><br>
       <label for ="email">Email :</label>
       <input type="email" name="email" placeholder="Enter Your Email"><br><br>
       </fieldset>
       <br>
       <fieldset>
       <b>Select Service</b><br>
       <input type="checkbox" name="op1" value="Webdev"> Web Development<br>
       <input type="checkbox" name="op2" value="aiml"> AI/ML<br>
       <input type="checkbox" name="op3" value="backend"> Backend <br><br> 
       </fieldset>
       <br>
       <fieldset>
    <b>Reason of Contact</b><br><br>
       <select id="role-select" name="user-role">
        <option value="" disabled selected>Select an option</option>
        <option value="job">Job</option>
        <option value="project">Project</option>
        <option value="thesis">Thesis</option>
      </select>
       </fieldset>

    <br><br>
    <fieldset>
      <b>Book Slot</b>
      <br><br>
    <input type ="date" name ="date">
    </fieldset>
    
    <br>
      <button name="Submit">Sumbit</button>
      <button name="reset">Reset</button>



      </form>
